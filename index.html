<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball in Rotating Hexagon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <canvas id="hexagonCanvas"></canvas>
        <div class="controls">
            <button id="startBtn">Start/Pause</button>
            <div class="slider-container">
                <label for="rotationSpeed">Rotation Speed:</label>
                <input type="range" id="rotationSpeed" min="0" max="2" step="0.1" value="0.5">
            </div>
            <div class="slider-container">
                <label for="gravity">Gravity:</label>
                <input type="range" id="gravity" min="0" max="1" step="0.05" value="0.3">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
